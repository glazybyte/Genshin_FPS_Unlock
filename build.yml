name: Build EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-binutils

      - name: Build DLL and EXE
        shell: msys2 {0}
        run: |
          /ucrt64/bin/windres app.rc -O coff -o app.o
          /ucrt64/bin/windres resource.rc -O coff -o resource.o

          g++ -shared -o payload.dll payload.cpp \
            -static-libgcc -static-libstdc++

          g++ unlocker.cpp resource.o app.o \
            -o Genshin_FPS_unlock.exe \
            -lcomdlg32 \
            -static \
            -static-libgcc \
            -static-libstdc++

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Genshin_FPS_unlock-exe
          path: Genshin_FPS_unlock.exe

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: payload-dll
          path: payload.dll